# Skeleton CI — lint + typecheck + unit/integration tests only.
# Build phase F replaces this with the full chain (build → Playwright dual-OS visual →
# @custom-media guard → dist/404.html assertion → gated Cloudflare deploy job).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      # vitest runs under `node` (its bin shebang), and the framework's route
      # compiler relies on the `URLPattern` global, which only exists on Node 24+
      # (matching engines.node). Without this the runner's stock Node lacks it.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test:unit
      - run: bun run test:integration
