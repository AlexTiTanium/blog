# Skeleton CI — lint + typecheck + unit/integration tests only.
# Build phase F replaces this with the full chain (build → Playwright dual-OS visual →
# @custom-media guard → dist/404.html assertion → gated Cloudflare deploy job).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      # vitest runs under `node` (its bin shebang), and the framework's route
      # compiler relies on the `URLPattern` global, which only exists on Node 24+
      # (matching engines.node). Without this the runner's stock Node lacks it.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test:unit
      - run: bun run test:integration
