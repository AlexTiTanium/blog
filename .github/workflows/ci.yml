# CI — lint + typecheck + unit/integration tests, plus the functional Playwright
# e2e suite (built site, real browsers). Deploys are gated on this workflow:
# deploy.yml triggers via `workflow_run` only after CI succeeds on main.
#
# Visual snapshot specs (`toHaveScreenshot`) are LOCAL-ONLY for now: every committed
# baseline is `*-darwin`, so they cannot pass on a linux runner. They stay excluded
# from the e2e job below until linux baselines land (`bun run test:e2e:update:linux`).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      # vitest runs under `node` (its bin shebang), and the framework's route
      # compiler relies on the `URLPattern` global, which only exists on Node 24+
      # (matching engines.node). Without this the runner's stock Node lacks it.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test:unit
      - run: bun run test:integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      # The playwright CLI runs under `node` (its bin shebang) — pin Node 24 to match
      # engines.node, same as the validate job.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      # playwright.config.ts's `webServer` (scripts/preview.ts) serves the ALREADY-BUILT
      # output dir — it has no build step of its own, so build first.
      - run: bun run build
      # All three engines from playwright.config.ts: chromium runs the full functional
      # suite; webkit + firefox still run the JS-boot guard (no-js-errors.spec.ts).
      - run: bunx playwright install --with-deps chromium webkit firefox
      # Functional + seo specs only. The visual snapshot specs (baseline, lang-switcher)
      # are excluded: zero *-linux baselines are committed, so visual tests are local-only
      # until linux baselines land. Keep this filter in sync with
      # tests/integration/ci-workflows.test.ts, which asserts it covers exactly the
      # snapshot-bearing specs.
      - run: bunx playwright test --grep-invert "(baseline|lang-switcher)\.spec\.ts"
