# .github/workflows/deploy.yml — generated by `app.deploy.init({ ci: true })`,
# then hand-edited to gate on CI: deploy runs only after the CI workflow succeeds
# for the commit on main (was: ungated `push`, racing CI on the same event).
# Actions are SHA-pinned (not floating tags) for supply-chain hygiene.

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # `workflow_run` fires on ANY CI completion (success or failure) — only deploy
    # when CI was green. `workflow_dispatch` stays as the manual escape hatch.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # `workflow_run` checks out the default-branch tip by default; pin to the
          # exact commit CI validated. Empty on `workflow_dispatch` → falls back to
          # the dispatched ref's sha.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      # mermaid-isomorphic renders ```mermaid fences through playwright's chromium
      # headless shell during the build — the runner needs the browser binary.
      - run: bunx playwright install --with-deps chromium-headless-shell
      - run: bun run build
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          # `--branch main` is required: the SHA-pinned checkout above leaves git on a
          # detached HEAD, so wrangler infers branch "head" and Cloudflare files the
          # deployment as a PREVIEW instead of promoting production.
          command: pages deploy dist --project-name geek-life --branch main
