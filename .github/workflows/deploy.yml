# .github/workflows/deploy.yml — generated by `app.deploy.init({ ci: true })`,
# then hand-edited to gate on CI: deploy runs only after the CI workflow succeeds
# for the commit on main (was: ungated `push`, racing CI on the same event).
# Actions are SHA-pinned (not floating tags) for supply-chain hygiene.

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # `workflow_run` fires on ANY CI completion (success or failure) — only deploy
    # when CI was green. `workflow_dispatch` stays as the manual escape hatch.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `workflow_run` checks out the default-branch tip by default; pin to the
          # exact commit CI validated. Empty on `workflow_dispatch` → falls back to
          # the dispatched ref's sha.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: cloudflare/wrangler-action@f84a562284fc78278ff9052435d9526f9c718361 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.34.0"
          command: pages deploy dist --project-name geek-life
